<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Binge Thinkers — Admin</title>
  <link rel="icon" href="/favicon/favicon.ico" />
  <link href="config.yml" type="application/yaml" rel="cms-config-url" />
</head>
<body>
  <div id="nc-root"></div>
  <noscript>Enable JavaScript to use the CMS.</noscript>
  <script>
    (function () {
      var OAUTH_KEY = 'decap-oauth-pending';

      function getBaseUrl(cb) {
        fetch('config.yml', { cache: 'no-store' })
          .then(function (r) { return r.text(); })
          .then(function (t) {
            var m = t.match(/^\s*base_url:\s*(\S+)/m);
            cb(m ? m[1].replace(/["']/g, '') : window.location.origin);
          })
          .catch(function () { cb(window.location.origin); });
      }

      function completeFromStorage() {
        var raw = localStorage.getItem(OAUTH_KEY);
        if (!raw) return;
        localStorage.removeItem(OAUTH_KEY);

        var payload;
        try { payload = JSON.parse(raw); } catch (e) { return; }

        getBaseUrl(function (baseUrl) {
          window.dispatchEvent(new MessageEvent('message', {
            data: 'authorizing:github',
            origin: baseUrl,
          }));
          window.dispatchEvent(new MessageEvent('message', {
            data: 'authorization:github:' + payload.status + ':' + JSON.stringify(payload.content),
            origin: baseUrl,
          }));
        });
      }

      window.addEventListener('load', completeFromStorage);
      window.addEventListener('focus', completeFromStorage);
      setInterval(completeFromStorage, 500);
    })();
  </script>
  <script src="https://unpkg.com/decap-cms@3.12.2/dist/decap-cms.js"></script>
  <script>
    window.addEventListener('unhandledrejection', function (event) {
      showBootError(String(event.reason && event.reason.message ? event.reason.message : event.reason));
    });
    window.addEventListener('error', function (event) {
      showBootError(event.message || String(event.error));
    });
    function showBootError(message) {
      var el = document.getElementById('cms-boot-error');
      if (!el) {
        el = document.createElement('pre');
        el.id = 'cms-boot-error';
        el.style.cssText = 'margin:1rem;padding:1rem;background:#fee;border:1px solid #c00;color:#400;font:14px/1.4 monospace;white-space:pre-wrap';
        document.body.prepend(el);
      }
      el.textContent = 'CMS failed to load. Check the browser console and /admin/config.yml.\n\n' + message;
    }
  </script>
</body>
</html>
